<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>{% block title %}Sistema de Votación{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body class="bg-light">

  <nav class="navbar navbar-dark bg-dark mb-4">
    <div class="container">
      <a class="navbar-brand fw-bold" href="{% url 'eleccion-list' %}">
        🗳️ Sistema de Votación
      </a>
      <a href="{% url 'eleccion-create' %}" class="btn btn-success btn-sm">
        + Nueva Elección
      </a>
    </div>
  </nav>

  <nav class="navbar navbar-dark bg-dark mb-4">
  <div class="container">
    <a class="navbar-brand fw-bold" href="{% url 'eleccion-list' %}">
      🗳️ Sistema de Votación
    </a>
    <div class="d-flex gap-2">
      <a href="{% url 'candidato-list' %}" class="btn btn-outline-light btn-sm">👤 Candidatos</a>
      <a href="{% url 'eleccion-create' %}" class="btn btn-success btn-sm">+ Nueva Elección</a>
    </div>
  </div>
</nav>

  <div class="container">
    {% for message in messages %}
      <div class="alert alert-success alert-dismissible fade show">
        {{ message }}
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
      </div>
    {% endfor %}

    {% block content %}{% endblock %}
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
