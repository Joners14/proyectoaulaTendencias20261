{% extends "elecciones/base.html" %}
{% block title %}Eliminar Elección{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="card border-danger shadow-sm">
      <div class="card-header bg-danger text-white">
        <h5 class="mb-0">⚠️ Confirmar eliminación</h5>
      </div>
      <div class="card-body text-center py-4">
        <p class="fs-5">¿Eliminar la elección:</p>
        <h4 class="text-danger">"{{ eleccion.nombre }}"</h4>
        <p class="text-muted">Esta acción no se puede deshacer.</p>
      </div>
      <div class="card-footer d-flex justify-content-center gap-3">
        <form method="post">
          {% csrf_token %}
          <button type="submit" class="btn btn-danger">Sí, eliminar</button>
        </form>
        <a href="{% url 'eleccion-list' %}" class="btn btn-secondary">Cancelar</a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
